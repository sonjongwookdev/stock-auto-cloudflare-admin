name = "stock-auto-cloudflare-admin"
main = "src/index.js"
compatibility_date = "2026-03-02"
workers_dev = true

# 환경별 설정
[env.production]
route = "admin.yourdomain.com/*"
zone_id = ""

[env.staging]
workers_dev = true

# 환경변수 (배포 시 명령어로 전달하거나 Cloudflare Dashboard에서 설정)
[vars]
# BACKEND_BASE_URL은 환경에 따라 다릅니다:
# - 로컬: http://localhost:4000
# - 운영: https://api.yourdomain.com
BACKEND_BASE_URL = "https://168.107.57.47.nip.io:4000"
